<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal To-Do App</title>
    <style>
        /* === GLOBAL STYLES === */
        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        /* === TERMINAL CONTAINER === */
        .mac-terminal {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            background-color: #1c1c1e;
            color: #f0f0f0;
            font-family: Menlo, Monaco, Consolas, "Courier New", monospace;
            font-size: 14px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            max-height: 80vh; /* Keeps it from getting too tall */
        }

        /* === HEADER & BUTTONS === */
        .terminal-header {
            background-color: #2d2d2d;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #111;
            flex-shrink: 0;
        }

        .terminal-buttons {
            position: absolute;
            left: 15px;
            display: flex;
            gap: 8px;
        }

        .btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .close { background-color: #ff5f56; }
        .minimize { background-color: #ffbd2e; }
        .maximize { background-color: #27c93f; }

        .terminal-title {
            color: #888;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 13px;
            font-weight: 600;
            user-select: none;
        }

        /* === TERMINAL BODY === */
        .terminal-body {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* Custom Scrollbar for Terminal */
        .terminal-body::-webkit-scrollbar { width: 8px; }
        .terminal-body::-webkit-scrollbar-track { background: #1c1c1e; }
        .terminal-body::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        .terminal-body::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Text Colors */
        .user { color: #27c93f; font-weight: bold; }
        .directory { color: #3498db; font-weight: bold; }
        
        /* === TO-DO LIST STYLES === */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0 0 20px 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .task-content {
            display: flex;
            gap: 10px;
            cursor: pointer;
            flex: 1;
        }

        .task-prefix { color: #ffbd2e; } /* Yellow arrow for tasks */

        .task-text { transition: color 0.2s; }

        .completed .task-text {
            text-decoration: line-through;
            color: #666;
        }

        .completed .task-prefix { color: #666; }

        .delete-btn {
            background: transparent;
            border: none;
            color: #ff5f56;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            padding: 0 5px;
        }

        .delete-btn:hover {
            color: #ff3b30;
            font-weight: bold;
        }

        .empty-state {
            color: #666;
            margin-bottom: 20px;
            font-style: italic;
        }

        /* === INPUT AREA === */
        .input-line {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            color: #f0f0f0;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            flex: 1;
            min-width: 150px;
        }

        #addBtn {
            background: transparent;
            border: none;
            color: #27c93f;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            padding: 0;
        }

        #addBtn:hover { font-weight: bold; }
    </style>
</head>
<body>

    <div class="mac-terminal" id="terminalBox">
        <div class="terminal-header">
            <div class="terminal-buttons">
                <div class="btn close"></div>
                <div class="btn minimize"></div>
                <div class="btn maximize"></div>
            </div>
            <div class="terminal-title">user@todo-app: ~</div>
        </div>
        
        <div class="terminal-body" id="terminalBody">
            <div id="emptyMessage" class="empty-state">No tasks found. Try typing one below.</div>
            
            <ul id="todoList"></ul>

            <div class="input-line">
                <span><span class="user">user@todo-app</span>:<span class="directory">~</span>$</span>
                <input type="text" id="todoInput" placeholder="enter task..." autocomplete="off" autofocus>
                <button id="addBtn">[Enter]</button>
            </div>
        </div>
    </div>

    <script>
        const todoInput = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');
        const emptyMessage = document.getElementById('emptyMessage');
        const terminalBody = document.getElementById('terminalBody');
        const terminalBox = document.getElementById('terminalBox');

        // Click anywhere on the terminal to focus the input, keeping the terminal feel
        terminalBox.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'SPAN') {
                todoInput.focus();
            }
        });

        // Load tasks from cache
        let tasks = JSON.parse(localStorage.getItem('mac_todo_cache')) || [];

        function renderTasks() {
            todoList.innerHTML = '';

            if (tasks.length === 0) {
                emptyMessage.style.display = 'block';
            } else {
                emptyMessage.style.display = 'none';
            }

            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                if (task.completed) li.classList.add('completed');

                // Wrapper for clickable task text
                const taskContent = document.createElement('div');
                taskContent.classList.add('task-content');
                taskContent.onclick = () => toggleTask(index);

                // Terminal-style arrow prefix
                const prefix = document.createElement('span');
                prefix.classList.add('task-prefix');
                prefix.textContent = '>';

                // Actual task text
                const span = document.createElement('span');
                span.classList.add('task-text');
                span.textContent = task.text;

                taskContent.appendChild(prefix);
                taskContent.appendChild(span);

                // Terminal-style delete button
                const deleteBtn = document.createElement('button');
                deleteBtn.classList.add('delete-btn');
                deleteBtn.textContent = '[x]';
                deleteBtn.title = 'Delete Task';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation(); // Prevents triggering the toggle click
                    deleteTask(index);
                };

                li.appendChild(taskContent);
                li.appendChild(deleteBtn);
                todoList.appendChild(li);
            });

            // Auto-scroll to bottom of terminal when rendering
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        function addTask() {
            const text = todoInput.value.trim();
            if (text !== '') {
                tasks.push({ text: text, completed: false });
                saveAndRender();
                todoInput.value = '';
                todoInput.focus();
            }
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveAndRender();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('mac_todo_cache', JSON.stringify(tasks));
            renderTasks();
        }

        addBtn.addEventListener('click', addTask);
        
        todoInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // Initial render
        renderTasks();
    </script>
</body>
</html>
