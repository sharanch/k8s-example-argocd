apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume
spec:
  replicas: 4
  selector:
    matchLabels:
      app: resume
  template:
    metadata:
      labels:
        app: resume
    spec:
      containers:
      - name: digiresume
        image: sharanch/digiresume:latest
        imagePullPolicy: Always  
        ports:
        - containerPort: 80           
---
apiVersion: v1
kind: Service
metadata:
  name: resume-service
spec:
  selector:
    app: resume
  ports:
    - protocol: TCP
      port: 80         
      targetPort: 80   
